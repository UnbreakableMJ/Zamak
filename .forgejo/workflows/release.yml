# ZAMAK release workflow: builds all release artifacts on tag push.

name: release

on:
  push:
    tags: ['v*.*.*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build-artifacts:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-uefi
            artifact: BOOTX64.EFI
          - target: i686-unknown-uefi
            artifact: BOOTIA32.EFI
          - target: aarch64-unknown-uefi
            artifact: BOOTAA64.EFI
          - target: riscv64gc-unknown-none-elf
            artifact: BOOTRISCV64.EFI
          - target: loongarch64-unknown-none
            artifact: BOOTLOONGARCH64.EFI
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
          targets: ${{ matrix.target }}
      - name: cargo build --release
        run: |
          cd Zamak
          cargo build -p zamak-uefi --release --target ${{ matrix.target }} \
            -Z build-std=core,alloc,compiler_builtins
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: Zamak/target/${{ matrix.target }}/release/*.efi

  bios-stage3:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: rust-src
      - name: build zamak-bios.sys
        run: cd Zamak && cargo build -p zamak-bios --release
      - uses: actions/upload-artifact@v4
        with:
          name: zamak-bios.sys
          path: Zamak/target/release/zamak-bios

  cli-binaries:
    strategy:
      matrix:
        include:
          - runner: ubuntu-latest
            name: zamak-linux-x86_64
          - runner: macos-latest
            name: zamak-macos-aarch64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: build zamak CLI
        run: cd Zamak && cargo build -p zamak-cli --release
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: Zamak/target/release/zamak

  publish:
    runs-on: ubuntu-latest
    needs: [build-artifacts, bios-stage3, cli-binaries]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          path: dist
      - uses: dtolnay/rust-toolchain@stable
      - name: compute SHA256SUMS
        run: |
          cd dist
          find . -type f | xargs sha256sum > ../SHA256SUMS
      - name: generate SPDX SBOM
        run: |
          cd Zamak
          cargo run -p zamak-cli -- sbom \
            --version "${GITHUB_REF_NAME#v}" \
            --output "../zamak-${GITHUB_REF_NAME#v}.spdx.json" \
            ../dist/**/*
      - name: create release
        run: echo "TODO: upload dist/, SHA256SUMS, and zamak-*.spdx.json via Forgejo release API"
